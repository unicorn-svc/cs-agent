    - data:
        code: "# [MOCK] FAQ 지식베이스 검색 + 관련도 평가 재검색 루프\n# 원래 기능: 고객 질문을 FAQ 지식베이스에서\
          \ 의미 검색하여 관련 답변과 관련도 점수를 반환\n# 확장: 검색 결과의 관련도/정확도를 평가 -> 90점 미만 시 질문 수정\
          \ -> 재검색 (최대 3회)\n# 전략: 입력 해시 기반 자동 변형 + 관련도 평가 루프\nimport json\n\ndef evaluate_relevance(query,\
          \ results, top_score):\n    \"\"\"검색 결과 관련도 평가 (0-100). 실제 구현: LLM 평가 노드로\
          \ 대체\"\"\"\n    if not results or top_score == 0:\n        return 0\n  \
          \  score = top_score\n    if len(results) > 1:\n        score = min(100,\
          \ score + 5)\n    return score\n\ndef refine_query(query, attempt):\n  \
          \  \"\"\"질문 프롬프트 수정. 실제 구현: LLM 재작성 노드로 대체\"\"\"\n    refinements = [\"\
          구체적으로\", \"자세히 알려주세요\", \"단계별로\"]\n    idx = min(attempt - 1, len(refinements)\
          \ - 1)\n    return query + \" \" + refinements[idx]\n\ndef search_faq(query,\
          \ category):\n    \"\"\"MOCK FAQ 검색 - 해시 전략\"\"\"\n    variant = sum(ord(c)\
          \ for c in query) % 3\n    if variant == 0:\n        return {\n        \
          \    \"results\": [{\"title\": \"FAQ-\" + category + \"-001\", \"content\"\
          : \"해당 제품의 사용 방법은 다음과 같습니다. 1) 전원 버튼을 3초간 누릅니다. 2) LED가 점멸하면 연결 준비 완료입니다.\
          \ 3) 기기와 페어링하세요.\", \"score\": 88}, {\"title\": \"FAQ-\" + category + \"\
          -002\", \"content\": \"추가 도움이 필요하시면 사용 설명서 12페이지를 참고해 주세요.\", \"score\"\
          : 76}],\n            \"top_score\": 88,\n            \"count\": 2\n    \
          \    }\n    elif variant == 1:\n        return {\"results\": [], \"top_score\"\
          : 0, \"count\": 0}\n    else:\n        return {\n            \"results\"\
          : [{\"title\": \"FAQ-일반-099\", \"content\": \"죄송합니다. 관련 FAQ를 찾을 수 없습니다.\"\
          , \"score\": 35}],\n            \"top_score\": 35,\n            \"count\"\
          : 1\n        }\n\ndef main(query: str, category: str) -> dict:\n    max_attempts\
          \ = 3\n    current_query = query\n    attempts_log = []\n    best_result\
          \ = None\n    best_score = 0\n\n    for attempt in range(1, max_attempts\
          \ + 1):\n        sr = search_faq(current_query, category)\n        results\
          \ = sr[\"results\"]\n        top_score = sr[\"top_score\"]\n        relevance\
          \ = evaluate_relevance(current_query, results, top_score)\n\n        attempts_log.append({\"\
          attempt\": attempt, \"query\": current_query, \"relevance\": relevance,\
          \ \"top_score\": top_score, \"count\": sr[\"count\"]})\n\n        if relevance\
          \ > best_score:\n            best_result = sr\n            best_score =\
          \ relevance\n\n        if relevance >= 90:\n            break\n        if\
          \ attempt < max_attempts:\n            current_query = refine_query(query,\
          \ attempt)\n\n    final = best_result if best_result else sr\n    return\
          \ {\n        \"result\": json.dumps(final[\"results\"], ensure_ascii=False)\
          \ if final[\"results\"] else \"[]\",\n        \"top_score\": final[\"top_score\"\
          ],\n        \"count\": final[\"count\"],\n        \"search_attempts\": attempt,\n\
          \        \"evaluation_log\": json.dumps(attempts_log, ensure_ascii=False)\n\
          \    }\n"
        code_language: python3
        desc: '[MOCK] FAQ 지식베이스 검색 + 관련도 평가 재검색 루프 (최대 3회) - 90점 미만 시 질문 수정 후 재검색'
        outputs:
