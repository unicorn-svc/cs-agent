    - data:
        code: "# [MOCK] 상담원 대기열 관리 - 프리셋 전략\n# 원래 기능: 복잡도/긴급도 기반 상담원 배정 우선순위 결정 및\
          \ 대기열 등록\n# 전략: 표준 글로벌 프리셋 4종 (default, empty, error, timeout)\nimport json\n\
          \ndef main(category: str, complexity: str, mock_preset: str, mock_override:\
          \ str) -> dict:\n    presets = {\n        \"default\": {\n            \"\
          agent_id\": \"AGT-042\",\n            \"agent_name\": \"김상담\",\n       \
          \     \"queue_position\": 2,\n            \"estimated_wait_minutes\": 5,\n\
          \            \"priority\": \"normal\",\n            \"status\": \"queued\"\
          \n        },\n        \"empty\": {\n            \"agent_id\": \"\",\n  \
          \          \"agent_name\": \"\",\n            \"queue_position\": 0,\n \
          \           \"estimated_wait_minutes\": 0,\n            \"priority\": \"\
          \",\n            \"status\": \"no_agent_available\",\n            \"_mock_note\"\
          : \"가용 상담원 없음\"\n        },\n        \"error\": {\n            \"agent_id\"\
          : \"\",\n            \"agent_name\": \"\",\n            \"queue_position\"\
          : 0,\n            \"estimated_wait_minutes\": 0,\n            \"priority\"\
          : \"\",\n            \"status\": \"system_error\",\n            \"_mock_error\"\
          : \"상담원 배정 시스템 연결 실패\"\n        },\n        \"timeout\": {\n           \
          \ \"agent_id\": \"\",\n            \"agent_name\": \"\",\n            \"\
          queue_position\": 0,\n            \"estimated_wait_minutes\": 0,\n     \
