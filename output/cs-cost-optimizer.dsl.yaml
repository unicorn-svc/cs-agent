    - data:
        code: "import json\n\ndef main(llm_output: str) -> dict:\n    \"\"\"LLM 분류\
          \ 결과 JSON을 파싱하여 개별 변수로 분리\"\"\"\n    try:\n        # JSON 부분만 추출 (LLM이 부가\
          \ 텍스트를 포함할 수 있으므로)\n        text = llm_output.strip()\n        start = text.find('{')\n\
          \        end = text.rfind('}') + 1\n        if start >= 0 and end > start:\n\
          \            result = json.loads(text[start:end])\n        else:\n     \
          \       result = {}\n        return {\n            \"complexity\": result.get(\"\
          complexity\", \"high\"),\n            \"category\": result.get(\"category\"\
          , \"기타\")\n        }\n    except (json.JSONDecodeError, Exception):\n  \
          \      return {\n            \"complexity\": \"high\",\n            \"category\"\
          : \"기타\"\n        }\n"
        code_language: python3
        desc: LLM 분류 결과 JSON을 파싱하여 complexity, category 변수로 분리
