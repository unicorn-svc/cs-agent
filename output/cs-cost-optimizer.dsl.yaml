    - data:
        code: "# [MOCK] 처리 건수 및 비용 집계 - 프리셋 전략\n# 원래 기능: 자동 처리 1건 완료 시 절감 비용을 계산하고\
          \ 누적 집계에 반영\n# 전략: 표준 글로벌 프리셋 4종 (default, empty, error, timeout)\nimport\
          \ json\n\ndef main(category: str, mock_preset: str, mock_override: str)\
          \ -> dict:\n    presets = {\n        \"default\": {\n            \"saved_cost\"\
          : 28000,\n            \"auto_processed\": 1,\n            \"total_saved_today\"\
          : 1960000,\n            \"total_auto_today\": 70,\n            \"cost_note\"\
          : \"자동 처리 1건 절감액: 28,000원 (상담원 1건 처리 비용 기준)\"\n        },\n        \"empty\"\
          : {\n            \"saved_cost\": 0,\n            \"auto_processed\": 0,\n\
          \            \"total_saved_today\": 0,\n            \"total_auto_today\"\
          : 0,\n            \"cost_note\": \"\",\n            \"_mock_note\": \"집계\
          \ 데이터 없음\"\n        },\n        \"error\": {\n            \"saved_cost\"\
          : 0,\n            \"auto_processed\": 0,\n            \"total_saved_today\"\
          : 0,\n            \"total_auto_today\": 0,\n            \"cost_note\": \"\
          \",\n            \"_mock_error\": \"집계 시스템 연결 실패\"\n        },\n       \
          \ \"timeout\": {\n            \"saved_cost\": 0,\n            \"auto_processed\"\
          : 0,\n            \"total_saved_today\": 0,\n            \"total_auto_today\"\
          : 0,\n            \"cost_note\": \"\",\n            \"_mock_error\": \"\
          집계 응답 시간 초과\"\n        }\n    }\n\n    if mock_override and mock_override.strip():\n\
          \        try:\n            result = json.loads(mock_override)\n        except\
          \ json.JSONDecodeError:\n            result = presets.get(\"default\")\n\
          \    else:\n        result = presets.get(mock_preset, presets[\"default\"\
          ])\n\n    result[\"category\"] = category\n    return {\n        \"saved_cost\"\
          : result.get(\"saved_cost\", 0),\n        \"auto_processed\": result.get(\"\
          auto_processed\", 0),\n        \"total_saved_today\": result.get(\"total_saved_today\"\
          , 0),\n        \"total_auto_today\": result.get(\"total_auto_today\", 0),\n\
          \        \"cost_note\": result.get(\"cost_note\", \"\")\n    }\n"
        code_language: python3
        desc: '[MOCK] 자동 처리 비용 절감 집계 (프리셋 전략) - 처리 1건당 절감 비용 계산 및 누적'
